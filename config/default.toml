[kernel]
# Development defaults. Use config/production.toml for deployment.
max_concurrent_tasks = 4
default_task_timeout_secs = 3600
context_window_max_entries = 500
context_window_token_budget = 32000
# SQLite DB for persisted runtime state (tasks, escalations, cost snapshots).
state_db_path = "/tmp/agentos/data/kernel_state.db"

# Sandbox execution policy for tool calls.
# "trust_aware" (default): Core tools run in-process, Community/Verified tools sandboxed.
# "always": All sandbox-eligible tools run in sandbox children (legacy behavior).
# "never": No sandboxing (development only, NOT for production).
sandbox_policy = "trust_aware"
# Maximum concurrent sandbox child processes. Default: number of logical CPUs (minimum 2).
# Increase if running many Community/Verified tools in parallel.
# max_concurrent_sandbox_children = 8  # example; actual default = num CPUs

[kernel.task_limits]
max_iterations_low = 50
max_iterations_medium = 200
max_iterations_high = 1000

[kernel.tool_calls]
allow_parallel = true
max_parallel = 10

# Limits applied when a task is submitted with autonomous=true.
# These replace the complexity-based caps so long-running agents can work
# to natural completion without hitting artificial iteration or time ceilings.
[kernel.autonomous_mode]
max_iterations = 10000
task_timeout_secs = 86400    # 24 hours
tool_timeout_seconds = 600   # 10 minutes per tool call
max_parallel_tool_calls = 10

[kernel.events]
# Capacity of the internal event dispatch channel (number of EventMessage slots).
# Events are dropped (with a warning logged and an EventChannelFull audit entry written)
# when the channel is full.  Increase this value if you observe dropped events under
# heavy load (10+ agents, frequent tool calls).
channel_capacity = 1024

[kernel.tool_execution]
# Maximum serialized bytes for a single tool's output injected into context.
# Outputs exceeding this are truncated with a marker so the agent can adapt.
# Long-running agentic workflows are not affected — only the output size is capped.
max_output_bytes = 262144    # 256 KiB
# Timeout for in-process (non-sandboxed) tool calls. Sandboxed tools use their
# manifest's sandbox.max_cpu_ms instead, which is set per tool.
# Autonomous tasks use autonomous_mode.tool_timeout_seconds instead.
default_timeout_seconds = 300

[secrets]
# Development default path (ephemeral on many systems).
# WARNING: /tmp is world-listable. For production use a private path such as
# ~/.agentos/vault/secrets.db or $XDG_DATA_HOME/agentos/vault/secrets.db.
# The kernel creates parent directories with 0o700 permissions at startup.
vault_path = "/tmp/agentos/vault/secrets.db"

[audit]
# Development default path (ephemeral on many systems).
log_path = "/tmp/agentos/data/audit.db"
# Maximum rows to retain (0 = unlimited). Older rows are pruned on each 10-minute sweep.
max_audit_entries = 0
# Number of recent entries to verify on startup (0 = full chain, may be slow for large logs).
verify_last_n_entries = 1000

[tools]
# Development default paths (ephemeral on many systems).
core_tools_dir = "/tmp/agentos/tools/core"
user_tools_dir = "/tmp/agentos/tools/user"
data_dir = "/tmp/agentos/data"

[tools.workspace]
# Additional directories the agent can access beyond data_dir.
# Each entry must be an absolute path pointing to a project or shared directory.
# System roots (/etc, /var, /root, /home itself, /) are rejected at startup.
# Example: allowed_paths = ["/home/user/project", "/shared/datasets"]
allowed_paths = []

[bus]
# Development default socket path.
socket_path = "/tmp/agentos/agentos.sock"

[ollama]
# Development default host. Override with AGENTOS_OLLAMA_HOST or production config.
host = "http://localhost:11434"
default_model = "llama3.2"
# HTTP request timeout for Ollama inference calls (seconds).
# Cloud-proxied models (e.g. kimi-k2.5:cloud, gpt-oss:120b-cloud) and large
# local models with many tools in context may need 300–600s.
request_timeout_secs = 300

[llm]
# Optional custom/OpenAI-compatible provider endpoint.
# For production, set AGENTOS_LLM_URL or configure this in config/production.toml.
# custom_base_url = "https://llm-gateway.example.com/v1"
# Optional OpenAI base URL override (for gateways/proxies).
openai_base_url = "https://api.openai.com/v1"
# Reserved for provider endpoint documentation parity.
anthropic_base_url = "https://api.anthropic.com/v1"
gemini_base_url = "https://generativelanguage.googleapis.com/v1beta"
# Maximum output tokens for Anthropic requests. Increase for long-form generation.
# Claude models support up to 8192 (claude-3) or 16384 (claude-3-5) output tokens.
max_tokens = 8192
# Context window size passed to Ollama as num_ctx. Many modern models support 32K+.
# Set to match your model's actual context size (e.g. 131072 for llama3.1:8b-instruct-q8_0).
ollama_context_window = 32768

[memory]
model_cache_dir = "models"

[memory.extraction]
enabled = true
conflict_threshold = 0.85
max_facts_per_result = 5
min_result_length = 50

[memory.consolidation]
enabled = true
min_pattern_occurrences = 3
task_completions_trigger = 100
time_trigger_hours = 24
max_episodes_per_cycle = 500

[context_budget]
total_tokens = 128000
reserve_pct = 0.25
system_pct = 0.15
tools_pct = 0.18
knowledge_pct = 0.30
history_pct = 0.25
task_pct = 0.12
# Characters-per-token ratio for token estimation.
# Default 4.0 is accurate for English/Latin text.
# For CJK (Chinese/Japanese/Korean) workloads, use 1.5-2.0.
chars_per_token = 4.0

[logging]
# Directory where rolling log files are written.
# Logs rotate daily; up to 7 days are kept.
# Set to "" to disable file logging (stderr only).
log_dir = "/tmp/agentos/logs"
# Minimum log level: trace | debug | info | warn | error
# Can be overridden at runtime with the RUST_LOG environment variable or `agentctl log set-level`.
log_level = "info"
# Output format: "text" (human-readable, default) or "json" (structured, for log aggregators like
# Loki, Datadog, or Elasticsearch). In production, set to "json".
log_format = "text"

[health_monitor]
enabled = true
check_interval_secs = 30

[health_monitor.thresholds]
cpu_warning_percent = 85.0
memory_warning_percent = 80.0
disk_warning_percent = 85.0
disk_critical_percent = 95.0
gpu_vram_warning_percent = 90.0
