{% for tool in tools %}
<article>
    <header>
        <strong>{{ tool.name }}</strong>
        <span class="badge badge-{{ tool.trust_tier|lower }}">{{ tool.trust_tier }}</span>
    </header>
    <p>{{ tool.description }}</p>
    <p>Permissions: {% for p in tool.permissions %}<code>{{ p }}</code>{% if not loop.last %}, {% endif %}{% endfor %}</p>
    <footer>
        <small>v{{ tool.version }}</small>
        <button class="outline secondary"
                hx-delete="/tools/{{ tool.name }}"
                hx-confirm="Remove {{ tool.name }}?"
                hx-target="closest article"
                hx-swap="outerHTML">Remove</button>
    </footer>
</article>
{% else %}
<p>No tools installed.</p>
{% endfor %}
