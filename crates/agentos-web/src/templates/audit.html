{% extends "base.html" %}
{% block content %}
<h1>Audit Log</h1>

<p>Total entries: {{ total_count }}</p>

<div class="grid">
    <div>
        <input type="text" name="event_type" placeholder="Filter by event type..."
               hx-get="/audit" hx-target="#audit-body" hx-swap="innerHTML"
               hx-trigger="keyup changed delay:300ms"
               hx-include="[name='event_type']"
               hx-vals='{"partial": "list"}'>
    </div>
</div>

<figure>
<table>
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>Event</th>
            <th>Severity</th>
            <th>Agent</th>
            <th>Task</th>
            <th>Tool</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody id="audit-body" hx-get="/audit?partial=list" hx-trigger="every 5s" hx-swap="innerHTML">
        {% for entry in entries %}
        <tr>
            <td>{{ entry.timestamp }}</td>
            <td>{{ entry.event_type }}</td>
            <td><span class="badge badge-{{ entry.severity|lower }}">{{ entry.severity }}</span></td>
            <td>{{ entry.agent_id|default("-", true) }}</td>
            <td>{{ entry.task_id|default("-", true) }}</td>
            <td>{{ entry.tool_id|default("-", true) }}</td>
            <td><small>{{ entry.details[:80] }}</small></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% endblock %}
