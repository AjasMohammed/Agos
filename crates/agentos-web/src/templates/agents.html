{% extends "base.html" %}
{% block content %}
<h1>Agent Manager</h1>

<div x-data="{ showModal: false }">
    <button @click="showModal = true">Connect New Agent</button>

    <dialog :open="showModal" @close="showModal = false">
        <article>
            <header>
                <button aria-label="Close" rel="prev" @click="showModal = false"></button>
                <h3>Connect Agent</h3>
            </header>
            <form method="post" action="/agents" hx-post="/agents" hx-target="#agent-grid" hx-swap="innerHTML">
                <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                <label for="name">Agent Name
                    <input type="text" id="name" name="name" required>
                </label>
                <label for="provider">Provider
                    <select id="provider" name="provider" required>
                        <option value="ollama">Ollama</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="gemini">Gemini</option>
                    </select>
                </label>
                <label for="model">Model
                    <input type="text" id="model" name="model" required placeholder="e.g. llama3, gpt-4o">
                </label>
                <label for="description">Description
                    <input type="text" id="description" name="description">
                </label>
                <button type="submit">Connect</button>
            </form>
        </article>
    </dialog>
</div>

<div id="agent-grid" class="grid" hx-get="/agents?partial=list" hx-trigger="every 5s" hx-swap="innerHTML">
    {% include "partials/agent_card.html" %}
</div>
{% endblock %}
