{% extends "base.html" %}
{% block content %}
<h1>Pipeline Manager</h1>

<div x-data="{ showRun: false, selectedPipeline: '' }">
    <figure>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Version</th>
                <th>Description</th>
                <th>Steps</th>
                <th>Installed</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody hx-get="/pipelines?partial=list" hx-trigger="every 10s" hx-swap="innerHTML">
            {% include "partials/pipeline_row.html" %}
        </tbody>
    </table>
    </figure>

    <dialog :open="showRun" @close="showRun = false">
        <article>
            <header>
                <button aria-label="Close" rel="prev" @click="showRun = false"></button>
                <h3>Run Pipeline</h3>
            </header>
            <form method="post" action="/pipelines/run" hx-post="/pipelines/run" hx-target="body" hx-push-url="true">
                <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                <input type="hidden" name="pipeline_name" :value="selectedPipeline">
                <label for="agent-name">Agent Name (required)
                    <input id="agent-name" name="agent_name" required
                           placeholder="Name of the agent to execute the pipeline">
                </label>
                <label for="pipeline-input">Input
                    <textarea id="pipeline-input" name="input" required rows="4"
                              placeholder="Pipeline input..."></textarea>
                </label>
                <button type="submit">Run</button>
            </form>
        </article>
    </dialog>
</div>
{% endblock %}
