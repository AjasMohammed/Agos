{% extends "base.html" %}
{% block content %}
<h1>Task Inspector</h1>

<figure>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Agent</th>
            <th>Status</th>
            <th>Prompt</th>
            <th>Created</th>
            <th>Tool Calls</th>
            <th>Tokens</th>
        </tr>
    </thead>
    <tbody id="task-list" hx-get="/tasks?partial=list" hx-trigger="every 3s" hx-swap="innerHTML">
        {% include "partials/task_row.html" %}
    </tbody>
</table>
</figure>
{% endblock %}
