{% extends "base.html" %}
{% block content %}
<h1>Secrets Manager</h1>

<div x-data="{ showAdd: false }">
    <button @click="showAdd = !showAdd">Add Secret</button>

    <dialog :open="showAdd" @close="showAdd = false">
        <article>
            <header>
                <button aria-label="Close" rel="prev" @click="showAdd = false"></button>
                <h3>Add Secret</h3>
            </header>
            <form method="post" action="/secrets" hx-post="/secrets" hx-target="body" hx-push-url="true">
                <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                <label for="secret-name">Name
                    <input type="text" id="secret-name" name="name" required placeholder="e.g. OPENAI_API_KEY">
                </label>
                <label for="secret-value">Value
                    <input type="password" id="secret-value" name="value" required>
                </label>
                <label for="secret-scope">Scope
                    <select id="secret-scope" name="scope">
                        <option value="global">Global</option>
                    </select>
                </label>
                <button type="submit">Save</button>
            </form>
        </article>
    </dialog>
</div>

<figure>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Scope</th>
            <th>Created</th>
            <th>Last Used</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody hx-get="/secrets?partial=list" hx-trigger="every 10s" hx-swap="innerHTML">
        {% include "partials/secret_row.html" %}
    </tbody>
</table>
</figure>
{% endblock %}
