{% extends "base.html" %}
{% block content %}
<h1>Secrets Manager</h1>

<div x-data="{ showAdd: false }">
    <button @click="showAdd = !showAdd">Add Secret</button>

    <dialog :open="showAdd" @close="showAdd = false">
        <article>
            <header>
                <button aria-label="Close" rel="prev" @click="showAdd = false"></button>
                <h3>Add Secret</h3>
            </header>
            <form method="post" action="/secrets">
                <label for="secret-name">Name
                    <input type="text" id="secret-name" name="name" required placeholder="e.g. OPENAI_API_KEY">
                </label>
                <label for="secret-value">Value
                    <input type="password" id="secret-value" name="value" required>
                </label>
                <label for="secret-scope">Scope
                    <select id="secret-scope" name="scope">
                        <option value="global">Global</option>
                    </select>
                </label>
                <button type="submit">Save</button>
            </form>
        </article>
    </dialog>
</div>

<figure>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Scope</th>
            <th>Created</th>
            <th>Last Used</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody hx-get="/secrets?partial=list" hx-trigger="every 10s" hx-swap="innerHTML">
        {% for secret in secrets %}
        <tr>
            <td><code>{{ secret.name }}</code></td>
            <td>{{ secret.scope }}</td>
            <td>{{ secret.created_at }}</td>
            <td>{{ secret.last_used_at|default("-", true) }}</td>
            <td>
                <button class="outline secondary small"
                        hx-delete="/secrets/{{ secret.name }}"
                        hx-confirm="Revoke {{ secret.name }}?"
                        hx-target="closest tr"
                        hx-swap="outerHTML">Revoke</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% endblock %}
