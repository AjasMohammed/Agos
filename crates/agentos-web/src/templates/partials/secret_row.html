{% for secret in secrets %}
<tr>
    <td><code>{{ secret.name }}</code></td>
    <td>{{ secret.scope }}</td>
    <td>{{ secret.created_at }}</td>
    <td>{{ secret.last_used_at|default("-", true) }}</td>
    <td>
        <button class="outline secondary small"
                hx-delete="/secrets/{{ secret.name }}"
                hx-confirm="Revoke {{ secret.name }}?"
                hx-target="closest tr"
                hx-swap="outerHTML">Revoke</button>
    </td>
</tr>
{% endfor %}
