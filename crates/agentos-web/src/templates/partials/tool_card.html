{% for tool in tools %}
<article>
    <header>
        <strong>{{ tool.name }}</strong>
        <span class="badge">{{ tool.executor_type }}</span>
    </header>
    <p>{{ tool.description }}</p>
    <p>v{{ tool.version }} | Status: {{ tool.status }}</p>
    <p>
        {% if tool.network %}<kbd>network</kbd>{% endif %}
        {% if tool.fs_write %}<kbd>fs_write</kbd>{% endif %}
    </p>
    <footer>
        <button class="outline secondary"
                hx-delete="/tools/{{ tool.name }}"
                hx-confirm="Remove {{ tool.name }}?"
                hx-target="closest article"
                hx-swap="outerHTML">Remove</button>
    </footer>
</article>
{% endfor %}
