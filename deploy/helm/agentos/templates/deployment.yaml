apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentos.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentos.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "agentos.serviceAccountName" . }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      initContainers:
        - name: init-data-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /work/data /work/user-tools && chown -R 65532:65532 /work
          volumeMounts:
            - name: data
              mountPath: /work
      containers:
        - name: agentos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["agentctl"]
          args: ["web", "serve", "--host", "0.0.0.0", "--port", "{{ .Values.service.port }}"]
          env:
            - name: AGENTOS_CONFIG
              value: /etc/agentos/config.toml
            - name: AGENTOS_AUTO_INIT_VAULT
              value: {{ .Values.config.autoInitVault | quote }}
            - name: AGENTOS_OLLAMA_HOST
              value: {{ .Values.config.ollamaHost | quote }}
            - name: AGENTOS_OLLAMA_MODEL
              value: {{ .Values.config.ollamaModel | quote }}
            - name: AGENTOS_LLM_URL
              value: {{ .Values.config.llmUrl | quote }}
            - name: AGENTOS_OPENAI_BASE_URL
              value: {{ .Values.config.openaiBaseUrl | quote }}
            - name: AGENTOS_LLM_ANTHROPIC_BASE_URL
              value: {{ .Values.config.anthropicBaseUrl | quote }}
            - name: AGENTOS_LLM_GEMINI_BASE_URL
              value: {{ .Values.config.geminiBaseUrl | quote }}
            - name: AGENTOS_OTEL_ENABLED
              value: {{ .Values.config.otelEnabled | quote }}
            - name: AGENTOS_OTEL_ENDPOINT
              value: {{ .Values.config.otelEndpoint | quote }}
            - name: AGENTOS_OTEL_SERVICE_NAME
              value: {{ .Values.config.otelServiceName | quote }}
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
            - name: AGENTOS_VAULT_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-vault" (include "agentos.fullname" .)) .Values.vault.existingSecret }}
                  key: AGENTOS_VAULT_PASSPHRASE
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
            - name: health
              containerPort: {{ .Values.service.healthPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/agentos/config.toml
              subPath: config.toml
              readOnly: true
            - name: data
              mountPath: /var/lib/agentos/data
              subPath: data
            - name: data
              mountPath: /var/lib/agentos/tools/user
              subPath: user-tools
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "agentos.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agentos.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
