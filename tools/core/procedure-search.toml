[manifest]
name        = "procedure-search"
version     = "1.0.0"
description = "Search procedural memory for learned procedures and SOPs using hybrid semantic search"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["memory.procedural:r"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "ProcedureSearchIntent"
output = "ProcedureSearchResult"

[input_schema]
type = "object"
required = ["query"]

[input_schema.properties.query]
type = "string"
description = "Natural-language procedure query"

[input_schema.properties.top_k]
type = "integer"
default = 5
minimum = 1
maximum = 20
description = "Maximum results"

[input_schema.properties.min_score]
type = "number"
default = 0.0
description = "Minimum relevance threshold"


[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 512
max_cpu_ms    = 15000
syscalls      = []
