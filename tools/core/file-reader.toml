[manifest]
name        = "file-reader"
version     = "1.1.0"
description = "Reads files from the data directory with line-based pagination and directory listing. Respects write locks — returns FileLocked if another agent is writing."
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["fs.user_data:r"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "FileReadIntent"
output = "FileContent"

[input_schema]
type = "object"
required = ["path"]

[input_schema.properties.path]
type = "string"
description = "Relative path to file or directory"

[input_schema.properties.mode]
type = "string"
enum = ["read", "list"]
default = "read"
description = "read for file content, list for directory listing"

[input_schema.properties.offset]
type = "integer"
default = 0
minimum = 0
description = "Line offset to start reading from"

[input_schema.properties.limit]
type = "integer"
default = 500
minimum = 0
description = "Maximum lines to return; 0 means no limit"

[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 5000
syscalls      = []
