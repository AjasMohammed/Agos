[manifest]
name        = "shell-exec"
version     = "1.0.0"
description = "Execute shell commands with path-restricted sandboxing (requires explicit permission)"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["process.exec:x", "fs.user_data:rw"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "ShellExecIntent"
output = "ShellExecResult"

[input_schema]
type = "object"
required = ["command"]

[input_schema.properties.command]
type = "string"
description = "Shell command string to execute"

[input_schema.properties.timeout_secs]
type = "integer"
default = 30
minimum = 1
description = "Execution timeout in seconds"

[input_schema.properties.allow_network]
type = "boolean"
default = false
description = "Allow network namespace sharing inside sandbox"

[sandbox]
network       = false
fs_write      = true
max_memory_mb = 256
max_cpu_ms    = 30000
