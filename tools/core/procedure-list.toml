[manifest]
name        = "procedure-list"
version     = "1.0.0"
description = "List all procedures in procedural memory owned by or shared with the current agent"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["memory.procedural:r"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "ProcedureListIntent"
output = "ProcedureListResult"

[input_schema]
type = "object"

[input_schema.properties.limit]
type = "integer"
default = 20
minimum = 1
maximum = 100
description = "Maximum procedures to return"


[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 2000
syscalls      = []
