[manifest]
name        = "file-grep"
version     = "1.0.0"
description = "Recursively searches files within data_dir for a regex pattern. Supports optional filename glob filter, context lines, three output modes (content, files_with_matches, count), max_results cap, and case-insensitive matching."
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["fs.user_data:r"]

[capabilities_provided]
outputs = ["search_results"]

[intent_schema]
input  = "FileGrepIntent"
output = "FileGrepResult"

[input_schema]
type = "object"
required = ["pattern"]

[input_schema.properties.pattern]
type = "string"
description = "Regular expression to search for"

[input_schema.properties.path]
type = "string"
default = "."
description = "Search root relative to data_dir"

[input_schema.properties.glob]
type = "string"
description = "Optional filename glob filter, e.g. *.rs"

[input_schema.properties.context_lines]
type = "integer"
default = 0
minimum = 0
description = "Context lines before/after matches in content mode"

[input_schema.properties.output_mode]
type = "string"
enum = ["content", "files_with_matches", "count"]
default = "files_with_matches"
description = "Result aggregation mode"

[input_schema.properties.max_results]
type = "integer"
default = 50
minimum = 1
description = "Maximum matches or files returned"

[input_schema.properties.case_insensitive]
type = "boolean"
default = false
description = "Use case-insensitive regex matching"

[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 128
max_cpu_ms    = 30000
syscalls      = []
