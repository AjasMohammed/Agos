[manifest]
name        = "memory-stats"
version     = "1.0.0"
description = "Report entry counts across all memory tiers for the current agent"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = []

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "MemoryStatsIntent"
output = "MemoryStatsResult"

[input_schema]
type = "object"
description = "No input required"


[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 2000
syscalls      = []
