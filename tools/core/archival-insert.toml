[manifest]
name        = "archival-insert"
version     = "1.0.0"
description = "Insert long-term archival memory into semantic storage"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["memory.semantic:w"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "ArchivalInsertIntent"
output = "ArchivalInsertResult"

[input_schema]
type = "object"
required = ["content"]

[input_schema.properties.content]
type = "string"
description = "Document content to insert into archival semantic memory"

[input_schema.properties.key]
type = "string"
default = "archival-note"
description = "Optional semantic key"

[input_schema.properties.tags]
type = "array"
description = "Optional tags"

[input_schema.properties.tags.items]
type = "string"

[sandbox]
network       = false
fs_write      = true
gpu           = false
max_memory_mb = 128
max_cpu_ms    = 10000
syscalls      = []
