[manifest]
name        = "file-writer"
version     = "1.1.0"
description = "Writes content to files with exclusive locking, atomic overwrite, append, and create_only modes. Blocks concurrent readers and writers with a FileLocked error."
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["fs.user_data:w"]

[capabilities_provided]
outputs = ["status"]

[intent_schema]
input  = "FileWriteIntent"
output = "WriteResult"

[sandbox]
network       = false
fs_write      = true
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 5000
syscalls      = []
