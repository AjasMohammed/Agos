[manifest]
name        = "file-writer"
version     = "1.1.0"
description = "Writes content to files with exclusive locking, atomic overwrite, append, and create_only modes. Blocks concurrent readers and writers with a FileLocked error."
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["fs.user_data:w"]

[capabilities_provided]
outputs = ["status"]

[intent_schema]
input  = "FileWriteIntent"
output = "WriteResult"

[input_schema]
type = "object"
required = ["path", "content"]

[input_schema.properties.path]
type = "string"
description = "Relative file path under data directory"

[input_schema.properties.content]
type = "string"
description = "Text content to write"

[input_schema.properties.mode]
type = "string"
enum = ["overwrite", "append", "create_only"]
default = "overwrite"
description = "Write mode"

[input_schema.properties.append]
type = "boolean"
default = false
description = "Legacy alias for mode=append"

[input_schema.properties.max_bytes]
type = "integer"
default = 10485760
minimum = 1
description = "Maximum allowed content size in bytes"

[sandbox]
network       = false
fs_write      = true
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 5000
syscalls      = []
