[manifest]
name        = "memory-block-delete"
version     = "1.0.0"
description = "Delete an agent-scoped labeled memory block"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["memory.blocks:w"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "MemoryBlockDeleteIntent"
output = "MemoryBlockDeleteResult"

[input_schema]
type = "object"
required = ["label"]

[input_schema.properties.label]
type = "string"
description = "Memory block label"

[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 3000
syscalls      = []
