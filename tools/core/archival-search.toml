[manifest]
name        = "archival-search"
version     = "1.0.0"
description = "Search long-term archival memory from semantic storage"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["memory.semantic:r"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "ArchivalSearchIntent"
output = "ArchivalSearchResult"

[input_schema]
type = "object"
required = ["query"]

[input_schema.properties.query]
type = "string"
description = "Natural-language search query"

[input_schema.properties.top_k]
type = "integer"
default = 5
minimum = 1
description = "Maximum number of results"

[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 128
max_cpu_ms    = 10000
syscalls      = []
