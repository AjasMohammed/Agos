[manifest]
name        = "memory-read"
version     = "1.0.0"
description = "Fetch a memory entry by key (semantic) or by ID (episodic)"
author      = "agentos-core"
trust_tier  = "core"

[capabilities_required]
permissions = ["memory.semantic:r", "memory.episodic:r"]

[capabilities_provided]
outputs = ["content.text"]

[intent_schema]
input  = "MemoryReadIntent"
output = "MemoryReadResult"

[input_schema]
type = "object"

[input_schema.properties.scope]
type = "string"
enum = ["semantic", "episodic"]
default = "semantic"
description = "Memory tier to read from"

[input_schema.properties.key]
type = "string"
description = "Semantic memory key (required when scope=semantic)"

[input_schema.properties.id]
type = "integer"
description = "Episodic entry ID (required when scope=episodic)"


[sandbox]
network       = false
fs_write      = false
gpu           = false
max_memory_mb = 64
max_cpu_ms    = 15000
syscalls      = []
